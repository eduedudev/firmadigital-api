# Configuración de la aplicación
spring.application.name=signer
server.port=8081

# Configuración de tamaño de archivos (para documentos grandes)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Jackson - Configuración JSON
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.indent-output=true

# Logging
logging.level.root=INFO
logging.level.ec.gob.defensoria.signer=DEBUG
logging.level.ec.gob.firmadigital.libreria=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
